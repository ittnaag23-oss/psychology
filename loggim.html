<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Psychology - Iniciar Sesión</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Paleta de colores: Azul calmante + Teal vibrante + Acentos cálidos */
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 50%, #90caf9 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            background: #f8f9ff;
            border-radius: 20px;
            box-shadow: 0 15px 50px rgba(25, 118, 210, 0.25);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 2px solid rgba(66, 165, 245, 0.15);
        }

        .header {
            /* Gradiente calmante: Azul profundo a Teal */
            background: linear-gradient(135deg, #1976d2 0%, #42a5f5 100%);
            color: white;
            padding: 25px 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(25, 118, 210, 0.2);
            position: relative;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #e3f2fd, #bbdefb, #90caf9, #42a5f5);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0%, 100% { background-position: -1000px 0; }
            50% { background-position: 1000px 0; }
        }

        .header h1 {
            font-size: 26px;
            margin-bottom: 5px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .header p {
            font-size: 13px;
            opacity: 0.95;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .login-form {
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-label {
            font-size: 14px;
            font-weight: 600;
            color: #0d47a1;
        }

        .form-input {
            padding: 13px 18px;
            border: 2px solid #e0e7ff;
            border-radius: 12px;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
            background: #f8f9ff;
            color: #2c3e50;
            font-family: inherit;
        }

        .form-input::placeholder {
            color: #78909c;
        }

        .form-input:focus {
            border-color: #1976d2;
            background: white;
            box-shadow: 0 0 0 3px rgba(25, 118, 210, 0.1);
        }

        .login-btn {
            padding: 15px;
            background: linear-gradient(135deg, #1976d2 0%, #0d47a1 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(25, 118, 210, 0.3);
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(25, 118, 210, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .guest-access {
            display: flex;
            justify-content: center;
            margin-top: 16px;
        }

        .guest-btn {
            padding: 14px 18px;
            background: #ffffff;
            color: #1976d2;
            border: 2px solid #1976d2;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .guest-btn:hover {
            background: #1976d2;
            color: white;
        }

        .forgot-password {
            text-align: center;
            margin-top: 15px;
        }

        .forgot-password a {
            color: #1976d2;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }

        .forgot-password a:hover {
            text-decoration: underline;
        }

        .register-link {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e0e7ff;
        }

        .register-link p {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
        }

        .register-link a {
            color: #0d47a1;
            text-decoration: none;
            font-weight: 600;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .login-container {
                max-width: 100%;
                margin: 20px;
            }

            .header h1 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="header">
            <h1>🌿 Psychology</h1>
            <p>Inicia sesión en tu cuenta</p>
        </div>

        <form class="login-form" action="#" method="post">
            <div class="form-group">
                <label class="form-label" for="email">Correo electrónico</label>
                <input 
                    type="email" 
                    class="form-input" 
                    id="email" 
                    placeholder="tu@email.com"
                    required
                >
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Contraseña</label>
                <input 
                    type="password" 
                    class="form-input" 
                    id="password" 
                    placeholder="Tu contraseña"
                    required
                >
            </div>

            <button type="submit" class="login-btn">Iniciar Sesión</button>
        </form>

        <div class="forgot-password">
            <a href="#">¿Olvidaste tu contraseña?</a>
        </div>

        <div class="guest-access">
            <button type="button" class="guest-btn" id="guestBtn">Continuar como invitado</button>
        </div>

        <div class="register-link">
            <p>¿No tienes cuenta?</p>
            <a href="register.html">Regístrate aquí</a>
        </div>
    </div>

    <script>
        const loginForm = document.querySelector('.login-form');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');

        // Crear elementos para mensajes de error/éxito
        const messageDiv = document.createElement('div');
        messageDiv.style.display = 'none';
        messageDiv.style.padding = '12px';
        messageDiv.style.marginBottomBottom = '15px';
        messageDiv.style.borderRadius = '4px';
        messageDiv.style.fontSize = '13px';
        loginForm.insertBefore(messageDiv, loginForm.firstChild);

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = emailInput.value.trim();
            const password = passwordInput.value;

            messageDiv.style.display = 'none';

            if (!email || !password) {
                showMessage('Por favor completa todos los campos', 'error');
                return;
            }

            try {
                const response = await fetch('http://localhost:3000/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (data.success) {
                    // Guardar usuario en localStorage
                    localStorage.setItem('user', JSON.stringify(data.user));
                    showMessage('¡Login exitoso! Redirigiendo...', 'success');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                } else {
                    showMessage(data.message || 'Error en el login', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showMessage('Error al conectar con el servidor', 'error');
            }
        });

        function showMessage(msg, type) {
            messageDiv.textContent = msg;
            messageDiv.style.display = 'block';
            if (type === 'error') {
                messageDiv.style.background = '#fee';
                messageDiv.style.borderLeft = '4px solid #f66';
                messageDiv.style.color = '#c33';
            } else {
                messageDiv.style.background = '#efe';
                messageDiv.style.borderLeft = '4px solid #6f6';
                messageDiv.style.color = '#3c3';
            }
        }

        document.getElementById('guestBtn').addEventListener('click', () => {
            const guestUser = { id: 'guest', name: 'Invitado', guest: true };
            localStorage.setItem('user', JSON.stringify(guestUser));
            window.location.href = 'index.html';
        });

        // Verificar si ya está logueado
        window.addEventListener('load', () => {
            const user = localStorage.getItem('user');
            if (user) {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
